<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#fff;font-family:'DM Sans',Arial,sans-serif;}
  .box{display:inline-block;vertical-align:top;}

  /* ---- HERO (faixa amarela, 600px) ---- */
  #hero{width:600px;position:relative;background:#F6C63C;padding:38px 34px 34px;overflow:hidden;}
  #hero .leaf{position:absolute;z-index:1;}
  #hero .leaf.tl{top:-14px;left:-10px;transform:rotate(8deg);}
  #hero .leaf.bc{bottom:-18px;left:44%;transform:rotate(-24deg);}
  #hero .grid{position:relative;z-index:3;display:flex;align-items:center;gap:10px;}
  #hero .left{flex:1 1 55%;}
  #hero .right{flex:1 1 45%;position:relative;min-height:210px;}
  #hero h1{font-family:'Nunito',Arial,sans-serif;font-weight:900;font-size:25px;line-height:1.12;letter-spacing:.2px;color:#F5484A;text-transform:uppercase;margin-bottom:20px;}
  .peca{display:inline-block;background:#F5484A;color:#FFC94D;padding:11px 22px;font-family:'Nunito',Arial,sans-serif;font-weight:900;font-size:13px;letter-spacing:.5px;text-transform:uppercase;border-radius:100px;box-shadow:0 6px 14px rgba(245,72,74,.35);}
  .peca .star{color:#FFC94D;margin-right:6px;}
  .shape{position:absolute;z-index:1;}
  .shape.coral{width:150px;height:150px;background:#F5484A;border-radius:26px;transform:rotate(-11deg);top:34px;left:34px;}
  .shape.amber{width:66px;height:66px;background:#F2A63B;border-radius:12px;transform:rotate(18deg);top:6px;right:2px;}
  .photo{position:absolute;z-index:2;top:26px;left:30px;width:172px;height:172px;border-radius:50%;object-fit:cover;border:5px solid #fff;box-shadow:0 10px 26px rgba(88,47,25,.28);}
  .spark{position:absolute;z-index:4;}
  .spark.s1{top:2px;left:14px;} .spark.s2{bottom:16px;left:2px;} .spark.s3{top:60px;right:2px;}
  .feather{position:absolute;z-index:2;bottom:-6px;right:14px;transform:rotate(12deg);}

  /* ---- SELO (sobre fundo cinza do cupom) ---- */
  #selo{width:200px;height:200px;background:#E9E7E4;display:flex;align-items:center;justify-content:center;}
  .selo-in{position:relative;width:176px;height:176px;}
  .selo-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .selo-txt .g{font-family:'Nunito',Arial,sans-serif;font-weight:700;font-size:15px;color:#FFC94D;margin-bottom:-6px;}
  .selo-txt .n{font-family:'Nunito',Arial,sans-serif;font-weight:900;font-size:54px;line-height:.9;color:#FFC94D;}
  .selo-txt .o{font-family:'Nunito',Arial,sans-serif;font-weight:900;font-size:19px;letter-spacing:2px;color:#fff;}
</style>
</head>
<body>
  <div id="hero" class="box">
    <svg class="leaf tl" width="86" height="86" viewBox="0 0 100 100" fill="none"><path d="M50 4C58 26 74 30 96 30 78 44 74 64 82 92 60 78 40 78 18 92 26 64 22 44 4 30 26 30 42 26 50 4Z" fill="#3C8C40"/></svg>
    <svg class="leaf bc" width="74" height="74" viewBox="0 0 100 100" fill="none"><path d="M50 4C58 26 74 30 96 30 78 44 74 64 82 92 60 78 40 78 18 92 26 64 22 44 4 30 26 30 42 26 50 4Z" fill="#357A38"/></svg>
    <div class="grid">
      <div class="left">
        <h1>A Mini Quiche<br>Lorraine chegou<br>ao&nbsp;cardápio!</h1>
        <span class="peca"><span class="star">★</span> Peça agora</span>
      </div>
      <div class="right">
        <div class="shape coral"></div>
        <div class="shape amber"></div>
        <img class="photo" src="hero.jpg" alt="">
        <svg class="spark s1" width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M12 0c1 6 5 10 12 11-7 1-11 5-12 12-1-7-5-11-12-12C7 10 11 6 12 0Z"/></svg>
        <svg class="spark s2" width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12 0c1 6 5 10 12 11-7 1-11 5-12 12-1-7-5-11-12-12C7 10 11 6 12 0Z"/></svg>
        <svg class="spark s3" width="15" height="15" viewBox="0 0 24 24" fill="#fff"><path d="M12 0c1 6 5 10 12 11-7 1-11 5-12 12-1-7-5-11-12-12C7 10 11 6 12 0Z"/></svg>
        <svg class="feather" width="30" height="46" viewBox="0 0 30 46" fill="none"><path d="M15 0C4 12 2 30 12 46c1-14 9-24 18-32C22 12 18 8 15 0Z" fill="#F2A63B"/></svg>
      </div>
    </div>
  </div>

  <br>

  <div id="selo" class="box">
    <div class="selo-in">
      <svg width="176" height="176" viewBox="0 0 240 240"><path d="M120.0,0.0 L135.0,25.2 L157.1,5.9 L163.6,34.5 L190.5,22.9 L187.9,52.1 L217.1,49.5 L205.5,76.4 L234.1,82.9 L214.8,105.0 L240.0,120.0 L214.8,135.0 L234.1,157.1 L205.5,163.6 L217.1,190.5 L187.9,187.9 L190.5,217.1 L163.6,205.5 L157.1,234.1 L135.0,214.8 L120.0,240.0 L105.0,214.8 L82.9,234.1 L76.4,205.5 L49.5,217.1 L52.1,187.9 L22.9,190.5 L34.5,163.6 L5.9,157.1 L25.2,135.0 L0.0,120.0 L25.2,105.0 L5.9,82.9 L34.5,76.4 L22.9,49.5 L52.1,52.1 L49.5,22.9 L76.4,34.5 L82.9,5.9 L105.0,25.2 Z" fill="#F5484A"/></svg>
      <div class="selo-txt"><span class="g">ganhe</span><span class="n">10%</span><span class="o">OFF</span></div>
    </div>
  </div>
</body>
</html>
